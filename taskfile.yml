version: "3"

vars:
  VERSION: '{{default "dev" .VERSION}}'

tasks:
  build:
    desc: Build the sew binary
    cmds:
      - go build -ldflags "-X main.version={{.VERSION}}" -o sew .

  lint:
    desc: Run linter
    cmds:
      - go tool revive -config .revive.toml -formatter friendly ./...

  fmt:yaml:
    desc: Format YAML files
    cmds:
      - yamlfmt registry/ *.yaml

  test:
    desc: Run tests
    cmds:
      - go tool gotestsum ./...

  lint:yaml:
    desc: Check YAML formatting
    cmds:
      - yamlfmt -lint registry/ *.yaml

  agents:update:
    desc: Regenerate the product agents table in AGENTS.md from agents/*-agent.md
    cmds:
      - go run ./agents/cmd/update

  site:generate:
    desc: Run the Go generator to produce Hugo content from registry
    cmds:
      - go run ./site/cmd/generate

  site:serve:
    desc: Generate content and start Hugo dev server
    cmds:
      - task: site:generate
      - go tool hugo server --source site

  site:build:
    desc: Generate content and build the Hugo site for production
    cmds:
      - task: site:generate
      - go tool hugo --minify --source site
