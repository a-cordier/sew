from:
  - mongodb/standalone
  - gravitee.io/oss/am/base
components:
  - name: mongodb
    namespace: gravitee
    k8s:
      manifests:
        - apiVersion: v1
          kind: Service
          metadata:
            name: mongodb
            labels:
              app: mongodb
          spec:
            type: ClusterIP
            ports:
              - port: 27017
                targetPort: 27017
                name: mongodb
            selector:
              app: mongodb
  - name: am
    requires:
      - component: mongodb
        conditions:
          ready: true
        selector:
          matchLabels:
            app: mongodb
        timeout: 15m
    helm:
      values:
        mongo:
          uri: mongodb://mongodb:27017/am?connectTimeoutMS=30000
