description: "Disable both Console and Portal UIs"
components:
  - name: apim
    helm:
      values:
        ui:
          enabled: false
        portal:
          enabled: false
images:
  preload:
    skip:
      - "graviteeio/apim-management-ui:{{ .imageTag }}"
      - "graviteeio/apim-portal-ui:{{ .imageTag }}"
