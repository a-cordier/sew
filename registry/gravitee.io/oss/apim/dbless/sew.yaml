from:
  - gravitee.io/oss/apim/base
  - gravitee.io/oss/gko
vars:
  helmVersion:
    default: ""
    description: "Helm chart version constraint"
  imageTag:
    default: "latest"
    description: "Docker image tag for the APIM gateway"
images:
  preload:
    mode: replace
    refs:
      - "graviteeio/apim-gateway:{{ .imageTag }}-debian"
      - graviteeio/kubernetes-operator:latest
kind:
  name: gravitee-dbless
components:
  - name: tls-server
    enabled: false
  - name: apim
    helm:
      values:
        api:
          enabled: false
        portal:
          enabled: false
        ui:
          enabled: false
        es:
          enabled: false
        ratelimit:
          type: none
        gateway:
          replicaCount: 1
          autoscaling:
            enabled: false
          dbLess: true
          reporters:
            elasticsearch:
              enabled: false
          servers:
            - type: http
              port: 8082
              service:
                type: NodePort
                nodePort: 30082
                externalPort: 82
              ingress:
                enabled: false
          service:
            type: NodePort
            nodePort: 30082
  - name: gko
    helm:
      values:
        manager:
          scope:
            cluster: false
