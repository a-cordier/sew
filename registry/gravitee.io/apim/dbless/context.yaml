kind:
  name: gio-dbless
  nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30083
        hostPort: 30083
      - containerPort: 30084
        hostPort: 30084

repos:
  - name: graviteeio
    url: https://helm.gravitee.io

components:
  - name: apim
    type: helm
    namespace: gravitee
    helm:
      chart: graviteeio/apim
      values:
        - values-apim.yaml

  - name: gko
    type: helm
    namespace: gravitee
    helm:
      chart: graviteeio/gko
      values:
        - values-gko.yaml
