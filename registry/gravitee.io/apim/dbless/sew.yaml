images:
  preload:
    refs:
      - graviteeio/apim-gateway:latest

kind:
  name: gio-dbless
  nodes:
  - role: control-plane
    extraPortMappings:
    - containerPort: 30082
      hostPort: 30082
    - containerPort: 30084
      hostPort: 30084

repos:
  - name: graviteeio
    url: https://helm.gravitee.io

components:
  - name: apim
    type: helm
    namespace: gravitee
    helm:
      chart: graviteeio/apim
      valueFiles:
        - values-apim.yaml

  - name: gko
    type: helm
    namespace: gravitee
    helm:
      chart: graviteeio/gko
      valueFiles:
        - values-gko.yaml
