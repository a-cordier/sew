repos:
  - name: graviteeio
    url: https://helm.gravitee.io
  - name: elastic
    url: https://helm.elastic.co

components:
  - name: mongodb
    type: manifest
    namespace: gravitee
    manifest:
      files:
        - mongodb.yaml

  - name: elasticsearch
    type: helm
    namespace: gravitee
    helm:
      chart: elastic/elasticsearch
      values:
        - values-elasticsearch.yaml

  - name: apim
    type: helm
    namespace: gravitee
    requires:
      - component: mongodb
        conditions:
          ready: true
        selector:
          matchLabels:
            app: mongodb
        timeout: 15m
      - component: elasticsearch
        conditions:
          ready: true
        selector:
          matchLabels:
            app: elasticsearch-master
        timeout: 15m
    helm:
      chart: graviteeio/apim
      values:
        - values-apim.yaml

