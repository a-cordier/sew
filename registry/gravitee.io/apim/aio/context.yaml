repos:
  - name: graviteeio
    url: https://helm.gravitee.io
  - name: elastic
    url: https://helm.elastic.co

components:
  - name: mongodb
    type: manifest
    namespace: gravitee
    manifest:
      files:
        - mongodb.yaml

  - name: elasticsearch
    type: helm
    namespace: gravitee
    helm:
      chart: elastic/elasticsearch
      values:
        - values-elasticsearch.yaml

  - name: apim
    type: helm
    namespace: gravitee
    helm:
      chart: graviteeio/apim
      values:
        - values-apim.yaml

