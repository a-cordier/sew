from:
  - mongodb/standalone
  - elastic/elasticsearch
images:
  preload:
    refs:
      - graviteeio/apim-gateway:latest-debian
      - graviteeio/apim-management-api:latest-debian
      - graviteeio/apim-management-ui:latest
      - graviteeio/apim-portal-ui:latest
kind:
  name: gio-apim
  nodes:
    - role: control-plane
      extraPortMappings:
        - containerPort: 30080
          hostPort: 30080
        - containerPort: 30081
          hostPort: 30081
        - containerPort: 30082
          hostPort: 30082
        - containerPort: 30083
          hostPort: 30083
        - containerPort: 30084
          hostPort: 30084
repos: # TODO put under a "helm" property
  - name: graviteeio
    url: https://helm.gravitee.io
components:
  - name: mongodb
    namespace: gravitee
  - name: elasticsearch
    namespace: gravitee
  - name: tls-server
    type: k8s
    namespace: gravitee
    k8s:
      manifests:
        - apiVersion: v1
          kind: Secret
          metadata:
            name: tls-server
            namespace: gravitee
          type: kubernetes.io/tls
          data:
            tls.crt: 
            tls.key: 
  - name: apim
    type: helm
    namespace: gravitee
    conditions:
      ready: true
    selector:
      matchLabels:
        app.kubernetes.io/instance: apim
    requires:
      - component: mongodb
        conditions:
          ready: true
        selector:
          matchLabels:
            app: mongodb
        timeout: 15m
      - component: elasticsearch
        conditions:
          ready: true
        selector:
          matchLabels:
            app: elasticsearch-master
        timeout: 15m
      - component: tls-server
    helm:
      chart: graviteeio/apim
      values:
        secrets:
          kubernetes:
            enabled: true
        mongo:
          uri: mongodb://mongodb:27017/gravitee?connectTimeoutMS=30000
        es:
          endpoints:
            - http://elasticsearch-master:9200
        ui:
          ingress:
            enabled: false
          service:
            type: NodePort
            nodePort: 30080
          baseURL: http://localhost:30083/management
          env:
            - name: CONSOLE_BASE_HREF
              value: /
        portal:
          enabled: true
          ingress:
            enabled: false
          service:
            type: NodePort
            nodePort: 30081
          baseURL: http://localhost:30083/portal
        gateway:
          ingress:
            enabled: false
          ingressController:
            enabled: true
          servers:
            - type: http
              port: 8082
              service:
                type: NodePort
                nodePort: 30082
                externalPort: 82
              ingress:
                enabled: false
            - type: http
              port: 8084
              service:
                type: NodePort
                nodePort: 30084
                externalPort: 84
              ingress:
                enabled: false
              ssl:
                keystore:
                  type: pem
                  secret: secret://kubernetes/tls-server
                clientAuth: request
          service:
            type: NodePort
          services:
            sync:
              kubernetes:
                enabled: true
          reporters:
            elasticsearch:
              enabled: true
        api:
          ingress:
            enabled: false
          service:
            type: NodePort
            nodePort: 30083
          env:
            - name: MANAGEMENT_MONGODB_TRANSACTIONAL
              value: "false"
        installation:
          api:
            url: http://localhost:30083
            proxyPath:
              management: /management
              portal: /portal
