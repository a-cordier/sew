images:
  preload:
    refs:
      - mongo:7
      - docker.elastic.co/elasticsearch/elasticsearch:9.3.1
      - graviteeio/apim-gateway:latest
      - graviteeio/apim-management-api:latest
      - graviteeio/apim-management-ui:latest
      - graviteeio/apim-portal-ui:latest

kind:
  name: gio-apim
  nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30080
        hostPort: 30080 
      - containerPort: 30081
        hostPort: 30081
      - containerPort: 30082
        hostPort: 30082
      - containerPort: 30083
        hostPort: 30083
      - containerPort: 30084
        hostPort: 30084

repos:
  - name: graviteeio
    url: https://helm.gravitee.io
  - name: elastic
    url: https://helm.elastic.co

components:
  - name: mongodb
    type: k8s
    namespace: gravitee
    k8s:
      manifestFiles:
        - mongodb.yaml

  - name: elasticsearch
    type: helm
    namespace: gravitee
    helm:
      chart: elastic/elasticsearch
      valueFiles:
        - values-elasticsearch.yaml

  - name: tls-server
    type: k8s
    namespace: gravitee
    k8s:
      manifestFiles:
        - tls-server.yaml

  - name: apim
    type: helm
    namespace: gravitee
    requires:
      - component: mongodb
        conditions:
          ready: true
        selector:
          matchLabels:
            app: mongodb
        timeout: 15m
      - component: elasticsearch
        conditions:
          ready: true
        selector:
          matchLabels:
            app: elasticsearch-master
        timeout: 15m
      - component: tls-server
    helm:
      chart: graviteeio/apim
      valueFiles:
        - values-apim.yaml

