clusterName: elasticsearch
nodeGroup: master

replicas: 1
minimumMasterNodes: 1
esJavaOpts: "-Xmx256m -Xms256m"

extraEnvs:
  - name: discovery.type
    value: single-node
  - name: xpack.security.enabled
    value: "false"

protocol: http

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

persistence:
  enabled: false
