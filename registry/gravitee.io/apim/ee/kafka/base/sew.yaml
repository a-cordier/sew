abstract: true
from:
  - kafka/standalone
features:
  lb:
    enabled: true
  dns:
    enabled: true
    records:
      - hostname: "*.kafka.sew.local"
        service: apim-gateway
        namespace: gravitee
components:
  - name: license
    type: k8s
    namespace: gravitee
    k8s:
      secrets:
        - name: gravitee-license
          fromFile: '$HOME/opt/gravitee/license.key'
          onMissing: ignore
  - name: kafka
    namespace: gravitee
    k8s:
      manifests:
        - apiVersion: v1
          kind: Service
          metadata:
            name: kafka
            labels:
              app: kafka
          spec:
            type: ClusterIP
            ports:
              - port: 9092
                targetPort: 9092
                name: internal
            selector:
              app: kafka
  - name: kafka-tls
    type: k8s
    namespace: gravitee
    k8s:
      manifests:
        - apiVersion: v1
          kind: Secret
          metadata:
            name: kafka-tls
          type: kubernetes.io/tls
          data:
            tls.crt: 
            tls.key: 
  - name: apim
    requires:
      - component: kafka
        conditions:
          ready: true
        selector:
          matchLabels:
            app: kafka
        timeout: 15m
    helm:
      values:
        license:
          name: gravitee-license
        gateway:
          service:
            type: LoadBalancer
          env:
            - name: KAFKA_PORT
              value: "9092"
            - name: KAFKA_SERVICE_HOST
              value: kafka
          kafka:
            enabled: true
            port: 9092
            host: 0.0.0.0
            routingMode: host
            routingHostMode:
              defaultDomain: kafka.sew.local
              defaultPort: 9092
            ssl:
              keystore:
                type: pem
                secret: secret://kubernetes/kafka-tls
