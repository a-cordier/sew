vars:
  clusterName:
    default: "eureka-standalone"
    description: "Name of the Kind cluster"
  imageRepository:
    default: "springcloud/eureka"
    description: "Eureka server Docker image repository"
  imageTag:
    default: "latest"
    description: "Eureka server Docker image tag"
images:
  preload:
    refs:
      - "{{ .imageRepository }}:{{ .imageTag }}"
kind:
  name: "{{ .clusterName }}"
  nodes:
    - role: control-plane
      extraPortMappings:
        - containerPort: 30761
          hostPort: 30761
components:
  - name: eureka
    type: k8s
    k8s:
      manifests:
        - apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: eureka
            labels:
              app: eureka
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: eureka
            template:
              metadata:
                labels:
                  app: eureka
              spec:
                containers:
                  - name: eureka
                    image: "{{ .imageRepository }}:{{ .imageTag }}"
                    ports:
                      - containerPort: 8761
                        name: http
                    env:
                      - name: JAVA_OPTS
                        value: "-Xmx256m -Xms256m"
                    resources:
                      requests:
                        cpu: 250m
                        memory: 256Mi
                      limits:
                        cpu: 500m
                        memory: 512Mi
        - apiVersion: v1
          kind: Service
          metadata:
            name: eureka
            labels:
              app: eureka
          spec:
            type: NodePort
            ports:
              - port: 8761
                targetPort: 8761
                nodePort: 30761
                name: http
            selector:
              app: eureka
