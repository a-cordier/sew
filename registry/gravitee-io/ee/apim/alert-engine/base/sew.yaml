abstract: true
vars:
  alertEngineImageRepository:
    default: "graviteeio/ae-engine"
    description: "Alert Engine Docker image repository"
  alertEngineImageTag:
    default: "2.3.1"
    description: "Alert Engine Docker image tag"
images:
  preload:
    refs:
      - "{{ .alertEngineImageRepository }}:{{ .alertEngineImageTag }}"
components:
  - name: license
    type: k8s
    namespace: gravitee
    k8s:
      secrets:
        - name: gravitee-license
          fromFile: '{{ env "HOME" }}/opt/gravitee/license.key'
          onMissing: ignore
  - name: alert-engine
    type: k8s
    namespace: gravitee
    conditions:
      ready: true
    selector:
      matchLabels:
        app: alert-engine
    k8s:
      manifests:
        - apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: alert-engine
            labels:
              app: alert-engine
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: alert-engine
            template:
              metadata:
                labels:
                  app: alert-engine
              spec:
                volumes:
                  - name: graviteeio-license
                    secret:
                      secretName: gravitee-license
                containers:
                  - name: alert-engine
                    image: "{{ .alertEngineImageRepository }}:{{ .alertEngineImageTag }}"
                    ports:
                      - containerPort: 8072
                        name: http
                      - containerPort: 18072
                        name: tech
                    env:
                      - name: gravitee_ingesters_ws_instances_0_host
                        value: "0.0.0.0"
                      - name: gravitee_ingesters_ws_instances_0_port
                        value: "8072"
                    volumeMounts:
                      - name: graviteeio-license
                        mountPath: /opt/graviteeio-alert-engine/license
                        readOnly: true
                    resources:
                      requests:
                        cpu: 250m
                        memory: 512Mi
                      limits:
                        cpu: "1"
                        memory: 1Gi
        - apiVersion: v1
          kind: Service
          metadata:
            name: alert-engine
            labels:
              app: alert-engine
          spec:
            type: ClusterIP
            ports:
              - port: 8072
                targetPort: 8072
                name: http
              - port: 18072
                targetPort: 18072
                name: tech
            selector:
              app: alert-engine
  - name: apim
    requires:
      - component: alert-engine
        conditions:
          ready: true
        selector:
          matchLabels:
            app: alert-engine
        timeout: 10m
    helm:
      values:
        license:
          name: gravitee-license
        gateway:
          extraVolumes: |
            - name: graviteeio-license
              secret:
                secretName: gravitee-license
          extraVolumeMounts: |
            - name: graviteeio-license
              mountPath: /opt/graviteeio-gateway/license
              readOnly: true
          env:
            - name: gravitee_alerts_alert-engine_enabled
              value: "true"
            - name: gravitee_alerts_alert-engine_ws_discovery
              value: "true"
            - name: gravitee_alerts_alert-engine_ws_endpoints_0
              value: "ws://alert-engine:8072"
        api:
          extraVolumes: |
            - name: graviteeio-license
              secret:
                secretName: gravitee-license
          extraVolumeMounts: |
            - name: graviteeio-license
              mountPath: /opt/graviteeio-management-api/license
              readOnly: true
          env:
            - name: gravitee_alerts_alert-engine_enabled
              value: "true"
            - name: gravitee_alerts_alert-engine_ws_discovery
              value: "true"
            - name: gravitee_alerts_alert-engine_ws_endpoints_0
              value: "ws://alert-engine:8072"
