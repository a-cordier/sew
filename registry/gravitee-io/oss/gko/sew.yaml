vars:
  clusterName:
    default: "gravitee"
    description: "Name of the Kind cluster"
  imageRepository:
    default: "graviteeio/kubernetes-operator"
    description: "GKO Docker image repository"
  imageTag:
    default: "latest"
    description: "GKO Docker image tag"
images:
  preload:
    refs:
      - "{{ .imageRepository }}:{{ .imageTag }}"
kind:
  name: "{{ .clusterName }}"
helm:
  repos:
    - name: graviteeio
      url: https://helm.gravitee.io
components:
  - name: gko
    type: helm
    namespace: gravitee
    helm:
      chart: graviteeio/gko
      values:
        manager:
          image:
            repository: "{{ .imageRepository }}"
            tag: "{{ .imageTag }}"
