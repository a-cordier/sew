from:
  - postgresql/standalone
  - gravitee-io/oss/am/jdbc/base
vars:
  jdbcDriver:
    default: "postgresql"
    description: "JDBC driver identifier"
  jdbcHost:
    default: "postgresql"
    description: "Database hostname"
  jdbcPort:
    default: "5432"
    description: "Database port"
  jdbcDatabase:
    default: "am"
    description: "Database name"
  jdbcUsername:
    default: "postgres"
    description: "JDBC username"
  jdbcPassword:
    default: "postgres"
    description: "JDBC password"
components:
  - name: postgresql
    namespace: gravitee
    k8s:
      manifests:
        - apiVersion: v1
          kind: Service
          metadata:
            name: postgresql
            labels:
              app: postgresql
          spec:
            type: ClusterIP
            ports:
              - port: 5432
                targetPort: 5432
                name: postgresql
            selector:
              app: postgresql
  - name: am
    requires:
      - component: postgresql
        conditions:
          ready: true
        selector:
          matchLabels:
            app: postgresql
        timeout: 15m
    helm:
      values:
        jdbc:
          driver: "{{ .jdbcDriver }}"
          host: "{{ .jdbcHost }}"
          port: "{{ .jdbcPort }}"
          database: "{{ .jdbcDatabase }}"
          username: "{{ .jdbcUsername }}"
          password: "{{ .jdbcPassword }}"
          drivers:
            - https://repo1.maven.org/maven2/org/postgresql/postgresql/42.7.4/postgresql-42.7.4.jar
            - https://repo1.maven.org/maven2/org/postgresql/r2dbc-postgresql/1.0.9.RELEASE/r2dbc-postgresql-1.0.9.RELEASE.jar
