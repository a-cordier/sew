description: "Deploy OpenSearch Dashboards alongside OpenSearch"
images:
  preload:
    refs:
      - opensearchproject/opensearch-dashboards:3.0.0
components:
  - name: opensearch-dashboards
    type: k8s
    namespace: gravitee
    conditions:
      ready: true
    selector:
      matchLabels:
        app: opensearch-dashboards
    requires:
      - component: opensearch
        conditions:
          ready: true
        selector:
          matchLabels:
            app.kubernetes.io/name: opensearch
        timeout: 5m
    k8s:
      manifests:
        - apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: opensearch-dashboards
            labels:
              app: opensearch-dashboards
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: opensearch-dashboards
            template:
              metadata:
                labels:
                  app: opensearch-dashboards
              spec:
                containers:
                  - name: dashboards
                    image: opensearchproject/opensearch-dashboards:3.0.0
                    ports:
                      - containerPort: 5601
                        name: http
                    env:
                      - name: OPENSEARCH_HOSTS
                        value: '["http://opensearch-cluster-master:9200"]'
                      - name: DISABLE_SECURITY_DASHBOARDS_PLUGIN
                        value: "true"
                    resources:
                      requests:
                        cpu: 100m
                        memory: 256Mi
                      limits:
                        cpu: 500m
                        memory: 512Mi
        - apiVersion: v1
          kind: Service
          metadata:
            name: opensearch-dashboards
            labels:
              app: opensearch-dashboards
          spec:
            type: ClusterIP
            ports:
              - port: 5601
                targetPort: 5601
                name: http
            selector:
              app: opensearch-dashboards
