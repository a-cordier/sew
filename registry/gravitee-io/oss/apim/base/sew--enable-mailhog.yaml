description: "Deploy MailHog and configure APIM email settings"
images:
  preload:
    refs:
      - mailhog/mailhog:latest
components:
  - name: mailhog
    type: k8s
    namespace: gravitee
    conditions:
      ready: true
    selector:
      matchLabels:
        app: mailhog
    k8s:
      manifests:
        - apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: mailhog
            labels:
              app: mailhog
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: mailhog
            template:
              metadata:
                labels:
                  app: mailhog
              spec:
                containers:
                  - name: mailhog
                    image: mailhog/mailhog:latest
                    ports:
                      - containerPort: 8025
                        name: ui
                      - containerPort: 1025
                        name: smtp
                    resources:
                      requests:
                        cpu: 50m
                        memory: 64Mi
                      limits:
                        cpu: 100m
                        memory: 128Mi
        - apiVersion: v1
          kind: Service
          metadata:
            name: mailhog
            labels:
              app: mailhog
          spec:
            type: ClusterIP
            ports:
              - port: 8025
                targetPort: 8025
                name: ui
              - port: 1025
                targetPort: 1025
                name: smtp
            selector:
              app: mailhog
  - name: apim
    requires:
      - component: mailhog
        conditions:
          ready: true
        selector:
          matchLabels:
            app: mailhog
        timeout: 5m
    helm:
      values:
        api:
          env:
            - name: gravitee_email_enabled
              value: "true"
            - name: gravitee_email_host
              value: mailhog
            - name: gravitee_email_port
              value: "1025"
            - name: gravitee_email_subject
              value: "[Gravitee.io] %s"
            - name: gravitee_email_from
              value: "noreply@gravitee.local"
