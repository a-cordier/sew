description: "Deploy Redis and enable distributed sync with multiple gateway replicas"
images:
  preload:
    refs:
      - redis/redis-stack:latest
components:
  - name: redis-distributed
    type: k8s
    namespace: gravitee
    conditions:
      ready: true
    selector:
      matchLabels:
        app: redis-distributed
    k8s:
      manifests:
        - apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: redis-distributed
            labels:
              app: redis-distributed
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: redis-distributed
            template:
              metadata:
                labels:
                  app: redis-distributed
              spec:
                containers:
                  - name: redis
                    image: redis/redis-stack:latest
                    ports:
                      - containerPort: 6379
                        name: redis
                    resources:
                      requests:
                        cpu: 100m
                        memory: 128Mi
                      limits:
                        cpu: 250m
                        memory: 256Mi
        - apiVersion: v1
          kind: Service
          metadata:
            name: redis-distributed
            labels:
              app: redis-distributed
          spec:
            type: ClusterIP
            ports:
              - port: 6379
                targetPort: 6379
                name: redis
            selector:
              app: redis-distributed
  - name: apim
    requires:
      - component: redis-distributed
        conditions:
          ready: true
        selector:
          matchLabels:
            app: redis-distributed
        timeout: 5m
    helm:
      values:
        gateway:
          replicaCount: 2
          env:
            - name: gravitee_distributed_sync_type
              value: redis
            - name: gravitee_distributed_sync_redis_host
              value: redis-distributed
            - name: gravitee_distributed_sync_redis_port
              value: "6379"
            - name: gravitee_services_sync_distributed_enabled
              value: "true"
