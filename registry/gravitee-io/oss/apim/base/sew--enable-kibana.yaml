description: "Deploy Kibana alongside Elasticsearch"
images:
  preload:
    refs:
      - docker.elastic.co/kibana/kibana:9.3.1
components:
  - name: kibana
    type: k8s
    namespace: gravitee
    conditions:
      ready: true
    selector:
      matchLabels:
        app: kibana
    requires:
      - component: elasticsearch
        conditions:
          ready: true
        selector:
          matchLabels:
            app: elasticsearch-master
        timeout: 5m
    k8s:
      manifests:
        - apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: kibana
            labels:
              app: kibana
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: kibana
            template:
              metadata:
                labels:
                  app: kibana
              spec:
                containers:
                  - name: kibana
                    image: docker.elastic.co/kibana/kibana:9.3.1
                    ports:
                      - containerPort: 5601
                        name: http
                    env:
                      - name: ELASTICSEARCH_HOSTS
                        value: "http://elasticsearch-master:9200"
                      - name: xpack.security.enabled
                        value: "false"
                    resources:
                      requests:
                        cpu: 100m
                        memory: 256Mi
                      limits:
                        cpu: 500m
                        memory: 512Mi
        - apiVersion: v1
          kind: Service
          metadata:
            name: kibana
            labels:
              app: kibana
          spec:
            type: ClusterIP
            ports:
              - port: 5601
                targetPort: 5601
                name: http
            selector:
              app: kibana
