description: "Enable bridge architecture: management API serves as bridge, gateway syncs through it"
kind:
  nodes:
    - role: control-plane
      extraPortMappings:
        - containerPort: 30085
          hostPort: 30085
components:
  - name: bridge-api
    type: k8s
    namespace: gravitee
    k8s:
      manifests:
        - apiVersion: v1
          kind: Service
          metadata:
            name: bridge-api
          spec:
            type: NodePort
            ports:
              - port: 18092
                targetPort: 18092
                nodePort: 30085
                name: bridge
            selector:
              app.kubernetes.io/instance: apim
              app.kubernetes.io/component: api
  - name: apim
    helm:
      values:
        api:
          env:
            - name: gravitee_services_bridge_http_enabled
              value: "true"
            - name: gravitee_services_bridge_http_port
              value: "18092"
            - name: gravitee_services_bridge_http_host
              value: "0.0.0.0"
            - name: gravitee_services_bridge_http_authentication_type
              value: none
            - name: gravitee_services_bridge_http_secured
              value: "false"
            - name: gravitee_services_bridge_http_ssl_clientAuth
              value: "false"
        gateway:
          env:
            - name: gravitee_management_type
              value: http
            - name: gravitee_management_http_url
              value: "http://bridge-api:18092"
