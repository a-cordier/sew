description: "Disable Elasticsearch and analytics reporters"
images:
  preload:
    skip:
      - docker.elastic.co/elasticsearch/elasticsearch:9.3.1
components:
  - name: elasticsearch
    enabled: false
  - name: apim
    helm:
      values:
        es:
          enabled: false
        gateway:
          reporters:
            elasticsearch:
              enabled: false
        api:
          env:
            - name: ANALYTICS_TYPE
              value: none
