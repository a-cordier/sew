description: "Deploy Redis and use it for gateway rate limiting"
images:
  preload:
    refs:
      - redis:7
components:
  - name: redis
    type: k8s
    namespace: gravitee
    conditions:
      ready: true
    selector:
      matchLabels:
        app: redis
    k8s:
      manifests:
        - apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: redis
            labels:
              app: redis
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: redis
            template:
              metadata:
                labels:
                  app: redis
              spec:
                containers:
                  - name: redis
                    image: redis:7
                    ports:
                      - containerPort: 6379
                        name: redis
                    resources:
                      requests:
                        cpu: 100m
                        memory: 128Mi
                      limits:
                        cpu: 250m
                        memory: 256Mi
        - apiVersion: v1
          kind: Service
          metadata:
            name: redis
            labels:
              app: redis
          spec:
            type: ClusterIP
            ports:
              - port: 6379
                targetPort: 6379
                name: redis
            selector:
              app: redis
  - name: apim
    requires:
      - component: redis
        conditions:
          ready: true
        selector:
          matchLabels:
            app: redis
        timeout: 5m
    helm:
      values:
        ratelimit:
          type: redis
        gateway:
          ratelimit:
            redis:
              host: redis
              port: 6379
