description: "Deploy the Gravitee Kubernetes Operator (GKO) alongside APIM"
vars:
  gkoImageRepository:
    default: "graviteeio/kubernetes-operator"
    description: "GKO Docker image repository"
  gkoImageTag:
    default: "latest"
    description: "GKO Docker image tag"
images:
  preload:
    refs:
      - "{{ .gkoImageRepository }}:{{ .gkoImageTag }}"
components:
  - name: gko
    type: helm
    namespace: gravitee
    helm:
      chart: graviteeio/gko
      values:
        manager:
          image:
            repository: "{{ .gkoImageRepository }}"
            tag: "{{ .gkoImageTag }}"
