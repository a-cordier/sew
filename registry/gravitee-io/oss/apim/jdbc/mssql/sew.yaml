from:
  - mssql/standalone
  - elastic/elasticsearch/standalone
  - gravitee-io/oss/apim/jdbc/base
vars:
  jdbcUrl:
    default: "jdbc:sqlserver://mssql:1433;databaseName=gravitee;encrypt=false"
    description: "JDBC connection URL"
  jdbcDriver:
    default: "https://repo1.maven.org/maven2/com/microsoft/sqlserver/mssql-jdbc/12.8.1.jre11/mssql-jdbc-12.8.1.jre11.jar"
    description: "JDBC driver download URL"
  jdbcUsername:
    default: "SA"
    description: "JDBC username"
  jdbcPassword:
    default: "Password1!"
    description: "JDBC password"
components:
  - name: mssql
    namespace: gravitee
    k8s:
      manifests:
        - apiVersion: v1
          kind: Service
          metadata:
            name: mssql
            labels:
              app: mssql
          spec:
            type: ClusterIP
            ports:
              - port: 1433
                targetPort: 1433
                name: mssql
            selector:
              app: mssql
  - name: mssql-init
    namespace: gravitee
  - name: elasticsearch
    namespace: gravitee
    helm:
      values:
        service:
          type: ClusterIP
          nodePort: null
  - name: apim
    requires:
      - component: mssql
        conditions:
          ready: true
        selector:
          matchLabels:
            app: mssql
        timeout: 15m
      - component: mssql-init
        conditions:
          ready: true
        selector:
          matchLabels:
            job-name: mssql-init
        timeout: 5m
      - component: elasticsearch
        conditions:
          ready: true
        selector:
          matchLabels:
            app: elasticsearch-master
        timeout: 15m
    helm:
      values:
        jdbc:
          url: "{{ .jdbcUrl }}"
          driver: "{{ .jdbcDriver }}"
          username: "{{ .jdbcUsername }}"
          password: "{{ .jdbcPassword }}"
        gateway:
          env:
            - name: gravitee_ratelimit_jdbc_uri
              value: "{{ .jdbcUrl }}"
            - name: gravitee_ratelimit_jdbc_username
              value: "{{ .jdbcUsername }}"
            - name: gravitee_ratelimit_jdbc_password
              value: "{{ .jdbcPassword }}"
