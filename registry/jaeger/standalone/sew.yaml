vars:
  clusterName:
    default: "jaeger-standalone"
    description: "Name of the Kind cluster"
  imageRepository:
    default: "jaegertracing/all-in-one"
    description: "Jaeger all-in-one Docker image repository"
  imageTag:
    default: "1.60"
    description: "Jaeger all-in-one Docker image tag"
images:
  preload:
    refs:
      - "{{ .imageRepository }}:{{ .imageTag }}"
kind:
  name: "{{ .clusterName }}"
  nodes:
    - role: control-plane
      extraPortMappings:
        - containerPort: 30686
          hostPort: 30686
        - containerPort: 30317
          hostPort: 30317
        - containerPort: 30318
          hostPort: 30318
components:
  - name: jaeger
    type: k8s
    k8s:
      manifests:
        - apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: jaeger
            labels:
              app: jaeger
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: jaeger
            template:
              metadata:
                labels:
                  app: jaeger
              spec:
                containers:
                  - name: jaeger
                    image: "{{ .imageRepository }}:{{ .imageTag }}"
                    env:
                      - name: COLLECTOR_OTLP_ENABLED
                        value: "true"
                    ports:
                      - containerPort: 16686
                        name: ui
                      - containerPort: 4317
                        name: otlp-grpc
                      - containerPort: 4318
                        name: otlp-http
                    resources:
                      requests:
                        cpu: 100m
                        memory: 128Mi
                      limits:
                        cpu: 500m
                        memory: 512Mi
        - apiVersion: v1
          kind: Service
          metadata:
            name: jaeger
            labels:
              app: jaeger
          spec:
            type: NodePort
            ports:
              - port: 16686
                targetPort: 16686
                nodePort: 30686
                name: ui
              - port: 4317
                targetPort: 4317
                nodePort: 30317
                name: otlp-grpc
              - port: 4318
                targetPort: 4318
                nodePort: 30318
                name: otlp-http
            selector:
              app: jaeger
