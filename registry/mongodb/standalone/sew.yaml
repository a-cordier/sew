vars:
  clusterName:
    default: "mongo-standalone"
    description: "Name of the Kind cluster"
  imageRepository:
    default: "mongo"
    description: "MongoDB Docker image repository"
  imageTag:
    default: "7"
    description: "MongoDB Docker image tag"
images:
  preload:
    refs:
      - "{{ .imageRepository }}:{{ .imageTag }}"
kind:
  name: "{{ .clusterName }}"
  nodes:
    - role: control-plane
      extraPortMappings:
        - containerPort: 30017
          hostPort: 30017
components:
  - name: mongodb
    type: k8s
    k8s:
      manifests:
        - apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: mongodb
            labels:
              app: mongodb
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: mongodb
            template:
              metadata:
                labels:
                  app: mongodb
              spec:
                containers:
                  - name: mongodb
                    image: "{{ .imageRepository }}:{{ .imageTag }}"
                    ports:
                      - containerPort: 27017
                        name: mongodb
                    resources:
                      requests:
                        cpu: 250m
                        memory: 512Mi
                      limits:
                        cpu: "1"
                        memory: 1Gi
        - apiVersion: v1
          kind: Service
          metadata:
            name: mongodb
            labels:
              app: mongodb
          spec:
            type: NodePort
            ports:
              - port: 27017
                targetPort: 27017
                nodePort: 30017
                name: mongodb
            selector:
              app: mongodb
