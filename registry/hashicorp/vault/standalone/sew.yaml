vars:
  clusterName:
    default: "vault-standalone"
    description: "Name of the Kind cluster"
  imageRepository:
    default: "hashicorp/vault"
    description: "Vault Docker image repository"
  imageTag:
    default: "1.21.2"
    description: "Vault Docker image tag"
images:
  preload:
    refs:
      - "{{ .imageRepository }}:{{ .imageTag }}"
kind:
  name: "{{ .clusterName }}"
  nodes:
    - role: control-plane
      extraPortMappings:
        - containerPort: 30820
          hostPort: 30820
helm:
  repos:
    - name: hashicorp
      url: https://helm.releases.hashicorp.com
components:
  - name: vault
    type: helm
    helm:
      chart: hashicorp/vault
      values:
        server:
          image:
            repository: "{{ .imageRepository }}"
            tag: "{{ .imageTag }}"
          dev:
            enabled: true
            devRootToken: root
          service:
            type: NodePort
            nodePort: 30820
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
        injector:
          enabled: false
