home: .sew
# Registry root (file:// for local directory, or HTTP URL)
registry: file://./registry
# Context path within the registry (org/product/variant)
context: gravitee.io/apim

kind:
  apiVersion: kind.x-k8s.io/v1alpha4
  kind: Cluster
  name: sew
  nodes:
  - role: control-plane
    extraPortMappings:
    - containerPort: 443
      hostPort: 443
    - containerPort: 80
      hostPort: 80
