name: Bug Report
description: Report a bug or unexpected behavior in sew
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: The minimal steps needed to reproduce the issue.
      placeholder: |
        1. Run `sew create ...`
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened. Include error messages or logs if applicable.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: sew version
      description: Output of `sew --version`.
      placeholder: "sew v0.1.0"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / Architecture
      description: e.g. macOS 15 arm64, Ubuntu 24.04 amd64
      placeholder: "macOS 15 arm64"
    validations:
      required: true
