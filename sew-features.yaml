registry: file://./registry
context: gravitee.io/apim/aio

features:
  load-balancer:
    enabled: true
  gateway:
    enabled: true
    channel: standard
  local-dns:
    enabled: true
    domain: sew.local
    port: 5353

images:
  mirrors: {}

components:
  - name: apim
    helm:
      values:
        gateway:
          service:
            type: LoadBalancer
