from:
  - mongodb/standalone
  - elastic/elasticsearch
  - gravitee.io/apim/aio/base
components:
  - name: mongodb
    namespace: gravitee
  - name: elasticsearch
    namespace: gravitee
  - name: apim
    requires:
      - component: mongodb
        conditions:
          ready: true
        selector:
          matchLabels:
            app: mongodb
        timeout: 15m
      - component: elasticsearch
        conditions:
          ready: true
        selector:
          matchLabels:
            app: elasticsearch-master
        timeout: 15m
    helm:
      values:
        mongo:
          uri: mongodb://mongodb:27017/gravitee?connectTimeoutMS=30000
        api:
          ingress:
            enabled: false
          service:
            type: NodePort
            nodePort: 30083
          env:
            - name: MANAGEMENT_MONGODB_TRANSACTIONAL
              value: "false"
