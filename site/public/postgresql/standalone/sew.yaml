images:
  preload:
    refs:
      - postgres:17
components:
  - name: postgresql
    type: k8s
    k8s:
      manifests:
        - apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: postgresql
            labels:
              app: postgresql
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: postgresql
            template:
              metadata:
                labels:
                  app: postgresql
              spec:
                containers:
                  - name: postgresql
                    image: postgres:17
                    ports:
                      - containerPort: 5432
                        name: postgresql
                    env:
                      - name: POSTGRES_DB
                        value: gravitee
                      - name: POSTGRES_USER
                        value: postgres
                      - name: POSTGRES_PASSWORD
                        value: postgres
                    resources:
                      requests:
                        cpu: 250m
                        memory: 256Mi
                      limits:
                        cpu: "1"
                        memory: 512Mi
        - apiVersion: v1
          kind: Service
          metadata:
            name: postgresql
            labels:
              app: postgresql
          spec:
            type: ClusterIP
            ports:
              - port: 5432
                targetPort: 5432
                name: postgresql
            selector:
              app: postgresql
