{{ define "main" }}
<div class="docs-layout">
  <aside class="docs-sidebar">
    <nav class="docs-nav">
      {{ $docsRoot := .Site.GetPage "/docs" }}
      {{ range $docsRoot.Sections }}
      <div class="docs-nav-section">
        {{ if .Pages }}
        <details{{ if ($.IsDescendant .) }} open{{ end }}>
          <summary>
            <a href="{{ .RelPermalink }}" class="{{ if eq $.RelPermalink .RelPermalink }}active{{ end }}">{{ .Title }}</a>
          </summary>
          <ul>
            {{ range .Pages }}
            <li>
              <a href="{{ .RelPermalink }}" class="{{ if eq $.RelPermalink .RelPermalink }}active{{ end }}">
                {{ .Title }}
              </a>
            </li>
            {{ end }}
          </ul>
        </details>
        {{ else }}
        <a href="{{ .RelPermalink }}" class="docs-nav-standalone{{ if eq $.RelPermalink .RelPermalink }} active{{ end }}">{{ .Title }}</a>
        {{ end }}
      </div>
      {{ end }}
    </nav>
  </aside>
  <div class="docs-content">
    <h1>{{ .Title }}</h1>
    <article class="content">
      {{ .Content }}
    </article>
  </div>
</div>
{{ end }}
